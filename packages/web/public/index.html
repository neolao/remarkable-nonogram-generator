<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remarkable Nonogram Generator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page">
      <h1>Remarkable Nonogram Generator</h1>

      <div class="card">
        <p>The manual grid editor is not built yet — this is the initial project scaffold.</p>
      </div>

      <div class="card">
        <p id="remarkable-status">Checking reMarkable connection...</p>

        <div id="pairing-section" style="display: none;">
          <p>
            Not connected to reMarkable yet. Get a one-time pairing code at
            <a href="https://my.remarkable.com/device/browser/connect" target="_blank" rel="noopener">my.remarkable.com/device/browser/connect</a>.
          </p>
          <label class="field">
            Pairing code
            <input type="text" id="pairing-code" name="pairing-code" />
          </label>
          <button id="pairing-submit" class="button" type="button">Pair device</button>
          <p id="pairing-error" role="alert"></p>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
